version: '3.8'

services:
  ring-to-open:
    build: .
    container_name: ring-to-open
    restart: unless-stopped
    environment:
      - RING_REFRESH_TOKEN=${RING_REFRESH_TOKEN}
      - DOOR_OPEN_TIME=${DOOR_OPEN_TIME:-08:00}
      - DOOR_CLOSE_TIME=${DOOR_CLOSE_TIME:-22:00}
      - AUTO_OPEN_ENABLED=${AUTO_OPEN_ENABLED:-true}
      - DEBUG=${DEBUG:-false}
      - HTTP_PORT=${HTTP_PORT:-3000}
      - API_SECRET=${API_SECRET}
    ports:
      - "${HTTP_PORT:-3000}:${HTTP_PORT:-3000}"
    # Join the shared Coolify network so other Coolify-managed containers
    # can reach this service at http://ring-to-open:3000
    networks:
      - coolify
    # In Coolify, /app is automatically mounted as a persistent volume,
    # so ring_refresh_token file stored there will survive redeployments.

networks:
  coolify:
    external: true
